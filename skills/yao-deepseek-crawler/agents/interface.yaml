interface:
  display_name: "Yao DeepSeek Crawler"
  short_description: "Repeat DeepSeek web AI-search crawls and generate raw JSON, structured Markdown/Excel, and target-vs-competitor entity probability reports."
  default_prompt: "Use $yao-deepseek-crawler when the user provides DeepSeek web AI-search keywords/questions, repeat count, target entity, and entity type, then needs a crawl JSON dataset, structured Markdown, structured Excel workbook, and a Kami-styled HTML report covering target-vs-same-type-competitor comparison, mention rate, average mentions, Top 1/Top 3/Top 5 probabilities, sentiment, source/channel/title intent analysis, bilingual summaries, clickable citations with unique compact URL labels, compact domain treemaps, solid color-coded click-to-reveal bubble benchmarks, and GEO recommendations with priority charts, core-metric trend projections, and concrete methods. Ask for the four standard inputs if they are missing: keywords, repeat count, target entity, entity type. Do not use it for generic web scraping, DeepSeek API-only calls, or one-off answer writing."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
    primary_commands:
      - "node scripts/preflight.mjs --help"
      - "node scripts/deepseek_batch_crawl.mjs --help"
      - "python3 scripts/analyze_deepseek_results.py --help"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
