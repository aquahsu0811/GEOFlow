interface:
  display_name: "Yao GEOFlow Operations"
  short_description: "Operate an existing GEOFlow 2.0.x instance through CLI, Laravel API v1, or authenticated admin web flows"
  default_prompt: "Use $yao-geoflow-cli to operate an existing GEOFlow 2.0.x system through the local geoflow CLI, Laravel API v1, or authenticated admin web routes: inspect catalog/material data, manage materials, tasks, jobs, drafts, reviews, published articles, distribution channels, Analytics, URL Import, System Updates, site settings, theme replication, AI configuration, API tokens, admin users, and run Docker/API/admin preflight checks."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
