interface:
  display_name: "Yao GEOFlow Design"
  short_description: "Discover, preview, edit, and enrich GEOFlow themes and homepage builder designs safely"
  default_prompt: "Use $yao-geoflow-design to discover GEOFlow Laravel Blade themes, create a preview edit session for a selected theme, enrich homepage composition for corporate/portal/content-hub front pages, generate reviewed homepage module/style JSON when HomepageModuleBuilder is available, or clone a reference style into a GEOFlow-compatible theme without breaking SEO/schema, markdown rendering, image, footer, route, or data contracts."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
