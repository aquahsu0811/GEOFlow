<style>
:root {
  --paper: #ffffff;
  --ivory: #faf9f5;
  --warm-sand: #e8e6dc;
  --brand: #1B365D;
  --brand-light: #2D5A8A;
  --near-black: #141413;
  --dark-warm: #3d3d3a;
  --olive: #5e5d59;
  --stone: #87867f;
  --border-cream: #e8e5da;
  --border-warm: #e0ddd2;
}
@page { size: A4 landscape; margin: 14mm; background: var(--paper); }
* { box-sizing: border-box; }
html, body {
  margin: 0 !important;
  padding: 0;
  width: 100%;
  max-width: none !important;
  background: var(--paper);
  color: var(--near-black);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  overflow-wrap: normal;
}
a { color: var(--brand); text-decoration: none; }
a:hover { text-decoration: underline; }
h1, h2, h3 {
  font-family: "TsangerJinKai02", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", Georgia, serif;
  font-weight: 500;
  color: var(--near-black);
}
h1 {
  font-size: 28px;
  line-height: 1.16;
  margin: 0 0 18px;
  max-width: 980px;
}
h2 {
  font-size: 19px;
  line-height: 1.25;
  margin: 30px 0 12px;
  padding: 0 0 0 11px;
  border-left: 4px solid var(--brand);
  break-after: avoid;
}
h3 { font-size: 16px; line-height: 1.3; margin: 22px 0 8px; }
p { margin: 8px 0 12px; color: var(--dark-warm); }
blockquote {
  margin: 0 0 22px;
  padding: 13px 16px;
  border-left: 4px solid var(--brand);
  background: var(--ivory);
  color: var(--dark-warm);
}
blockquote p { margin: 0; }
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin: 10px 0 22px;
  background: var(--paper);
  border: 1px solid var(--border-warm);
}
th, td {
  border: 1px solid var(--border-warm);
  padding: 8px 9px;
  text-align: left;
  vertical-align: top;
  word-break: normal;
  overflow-wrap: anywhere;
}
th {
  background: var(--ivory);
  color: var(--near-black);
  font-weight: 600;
}
tbody tr:nth-child(odd) td { background: #fffdfa; }
tr { break-inside: avoid; }
code {
  font-family: "JetBrains Mono", "SF Mono", Consolas, Monaco, monospace;
  font-size: 12px;
  background: var(--ivory);
  padding: 1px 4px;
  border: 1px solid var(--border-cream);
  border-radius: 4px;
}
ul { padding-left: 22px; }
li { margin: 4px 0; }
hr { border: 0; border-top: 1px solid var(--border-warm); margin: 24px 0; }
@media screen and (min-width: 900px) {
  body { padding: 32px 38px 56px 328px; }
  body > *:not(nav#TOC) { width: 100%; max-width: 1140px; margin-left: 0; margin-right: auto; }
  nav#TOC {
    position: fixed;
    top: 18px;
    left: 18px;
    bottom: 18px;
    width: 274px;
    overflow: auto;
    padding: 17px 16px 20px;
    border: 1px solid var(--border-cream);
    background: var(--paper);
    box-shadow: 0 0 0 1px #f2f0e8;
    z-index: 20;
  }
  nav#TOC::before { content: "报告菜单"; display: block; font-weight: 600; color: var(--near-black); margin-bottom: 10px; }
  nav#TOC ul { list-style: none; padding-left: 0; margin: 0; }
  nav#TOC li { margin: 4px 0; }
  nav#TOC a { display: block; padding: 3px 0; font-size: 12px; line-height: 1.35; color: var(--brand); }
}
@media screen and (max-width: 899px) {
  body { padding: 0 14px 40px; }
  h1 { font-size: 24px; margin-top: 18px; }
  nav#TOC {
    position: sticky;
    top: 0;
    z-index: 20;
    max-height: 42vh;
    overflow: auto;
    margin: 0 -14px 20px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border-warm);
    background: var(--paper);
    box-shadow: 0 0 0 1px #f2f0e8;
  }
  nav#TOC::before { content: "报告菜单"; display: block; font-weight: 600; margin-bottom: 6px; }
  nav#TOC ul { margin: 0; padding-left: 18px; }
}
@media print {
  body { padding: 0; }
  nav#TOC { display: none; }
  body > * { max-width: none; }
  h2 { break-after: avoid; }
}
</style>
